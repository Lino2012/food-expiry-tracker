version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: food-expiry-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: food_expiry_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: food-expiry-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: food_expiry_db
      DB_USER: appuser
      DB_PASSWORD: apppassword
    networks:
      - food-network
    volumes:
      - ./logs:/usr/local/tomcat/logs

volumes:
  mysql_data:

networks:
  food-network:
    driver: bridge